name: Build & Release TalkPC Pro

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Python dependencies
        working-directory: ./client
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.11.1

      - name: PyInstaller build
        working-directory: ./client
        run: pyinstaller TalkPC-Pro.spec --noconfirm

      - name: Zip portable
        working-directory: ./client
        shell: pwsh
        run: |
          Compress-Archive -Path dist/TalkPC-Pro/* `
            -DestinationPath dist/TalkPC-Pro-windows-x64.zip `
            -Force

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Update installer version
        working-directory: ./installer
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          (Get-Content TalkPC-Pro.iss) -replace '#define MyAppVersion "[^"]+"', "#define MyAppVersion `"$version`"" | Set-Content TalkPC-Pro.iss

      - name: Build installer (Inno Setup)
        working-directory: ./installer
        shell: pwsh
        run: |
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' TalkPC-Pro.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            client/dist/TalkPC-Pro-windows-x64.zip
            installer/output/TalkPC-Pro-Setup.exe
          name: TalkPC Pro ${{ github.ref_name }}
          body: |
            ## TalkPC Pro ${{ github.ref_name }}

            ### 다운로드 (둘 중 하나 선택)

            | 파일 | 추천 대상 | 크기 |
            |---|---|---|
            | **`TalkPC-Pro-Setup-${{ github.ref_name }}.exe`** ⭐ | 일반 사용자 (자동 설치, 바탕화면 아이콘) | ~290MB |
            | `TalkPC-Pro-${{ github.ref_name }}-windows-x64.zip` | 압축 해제만 원하는 분 | ~290MB |

            ### 설치 후
            1. 바탕화면의 **TalkPC Pro** 아이콘 더블 클릭
            2. 가입한 계정으로 로그인 (없으면 [회원가입](https://talkpc-pro-yf6w.vercel.app/signup))

            ### Windows SmartScreen 경고 우회
            처음 실행 시 "Windows의 PC 보호" 파란 창이 뜨면:
            - **추가 정보** 클릭 → **실행** 버튼 클릭
            - 또는 다운받은 파일 우클릭 → 속성 → "차단 해제" 체크

            ### 시스템 요구사항
            - Windows 10 / 11 (64-bit) · 카카오톡 PC · 메모리 4GB+
          draft: false
          prerelease: false
