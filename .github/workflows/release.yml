name: Build & Release TalkPC Pro

on:
  push:
    tags: ["v*"]            # v0.1.0, v1.0.0 등 tag push 시 트리거
  workflow_dispatch:        # 수동 트리거도 허용

permissions:
  contents: write           # release 업로드용

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        working-directory: ./client
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.11.1

      - name: Download paddle models (if not in repo)
        working-directory: ./client
        shell: pwsh
        run: |
          if (-not (Test-Path paddle_models/det)) {
            New-Item -ItemType Directory -Force -Path paddle_models/det/Multilingual_PP-OCRv3_det_infer | Out-Null
            New-Item -ItemType Directory -Force -Path paddle_models/rec/korean_PP-OCRv4_rec_infer | Out-Null
            # 실제 모델은 talk-local 에서 copy 또는 PaddleOCR 첫 init 자동 다운로드
            Write-Host "Models will be lazy-downloaded by PaddleOCR on first run"
          }

      - name: PyInstaller build
        working-directory: ./client
        run: pyinstaller TalkPC-Pro.spec --noconfirm

      - name: Zip artifact
        working-directory: ./client
        shell: pwsh
        run: |
          Compress-Archive -Path dist/TalkPC-Pro/* `
            -DestinationPath dist/TalkPC-Pro-${{ github.ref_name }}-windows-x64.zip `
            -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            client/dist/TalkPC-Pro-${{ github.ref_name }}-windows-x64.zip
          name: TalkPC Pro ${{ github.ref_name }}
          body: |
            ## TalkPC Pro ${{ github.ref_name }}

            **Windows x64 설치 파일**

            ### 설치 방법
            1. 위 zip 다운로드 → 임의 폴더에 압축 해제
            2. `TalkPC-Pro.exe` 실행
            3. 가입한 계정으로 로그인 (없으면 https://talkpc-pro-yf6w.vercel.app/signup)

            ### 시스템 요구사항
            - Windows 10 / 11 (64-bit)
            - 카카오톡 PC 설치
            - 메모리 4GB 이상
          draft: false
          prerelease: false
